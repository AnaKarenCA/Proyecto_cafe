version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: cafe_mysql
    restart: always
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cafeteria_escolar
      MYSQL_USER: cafe_user
      MYSQL_PASSWORD: cafe_pass
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
