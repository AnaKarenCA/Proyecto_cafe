services:
  mysql:
    image: mysql:8.0
    container_name: cafe_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: cafeteria_accesible
      MYSQL_USER: cafe_user
      MYSQL_PASSWORD: cafe_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d

volumes:
  mysql_data: